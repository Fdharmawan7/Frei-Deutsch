<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Deutsch Quiz A1</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#302b63"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Deutsch Quiz"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Segoe UI', sans-serif;
  padding: 16px;
}
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 28px 22px;
  width: 100%; max-width: 420px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  color: #fff;
  position: relative;
}
.close-btn {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none;
  color: rgba(255,255,255,0.6); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.title {
  font-size: 26px; font-weight: 800; text-align: center;
  background: linear-gradient(90deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.subtitle { text-align: center; color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 20px; }
.flag { text-align: center; font-size: 48px; margin-bottom: 10px; }
input {
  width: 100%; padding: 13px 16px; border-radius: 14px;
  border: 2px solid rgba(167,139,250,0.3);
  background: rgba(255,255,255,0.07); color: #fff;
  font-size: 16px; outline: none; margin-bottom: 14px;
}
input::placeholder { color: rgba(255,255,255,0.3); }
.btn-primary {
  width: 100%; padding: 15px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, #a78bfa, #60a5fa);
  color: #fff; font-size: 16px; font-weight: 700; cursor: pointer;
}
.btn-secondary {
  width: 100%; padding: 13px; border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.15);
  background: transparent; color: rgba(255,255,255,0.7);
  font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px;
}
.btn-danger {
  width: 100%; padding: 13px; border-radius: 14px;
  border: 2px solid rgba(248,113,113,0.3);
  background: rgba(248,113,113,0.1); color: #f87171;
  font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px;
}
.tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 18px; }
.tag { background: rgba(255,255,255,0.07); border-radius: 99px; padding: 4px 12px; font-size: 11px; color: rgba(255,255,255,0.5); }
.meta { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 12px; color: rgba(255,255,255,0.5); align-items: center; flex-wrap: wrap; gap: 4px; }
.badge { background: linear-gradient(135deg,#a78bfa,#60a5fa); border-radius: 99px; padding: 2px 10px; color: #fff; font-weight: 700; font-size: 12px; }
.timer-bar { height: 5px; border-radius: 99px; background: rgba(255,255,255,0.1); margin-bottom: 6px; overflow: hidden; }
.timer-fill { height: 100%; border-radius: 99px; transition: width 1s linear, background 0.3s; }
.timer-text { text-align: right; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
.q-card { background: rgba(255,255,255,0.07); border-radius: 16px; padding: 18px; margin-bottom: 14px; text-align: center; }
.q-emoji { font-size: 40px; margin-bottom: 8px; }
.q-text { font-size: 16px; font-weight: 600; }
.q-cat { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 5px; }
.opt-btn {
  width: 100%; padding: 12px 14px; border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.07); color: #fff;
  font-size: 14px; font-weight: 500; cursor: pointer;
  text-align: left; margin-bottom: 8px; transition: all 0.2s;
}
.opt-btn.correct { background: rgba(74,222,128,0.2); border-color: #4ade80; color: #4ade80; }
.opt-btn.wrong { background: rgba(248,113,113,0.2); border-color: #f87171; color: #f87171; }
.opt-btn:disabled { cursor: default; }
.score-circle {
  width: 90px; height: 90px; border-radius: 50%;
  background: linear-gradient(135deg,#a78bfa,#60a5fa);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 18px; box-shadow: 0 0 35px rgba(167,139,250,0.4);
}
.score-num { font-size: 24px; font-weight: 800; }
.score-label { font-size: 10px; opacity: 0.8; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.stat-box { background: rgba(255,255,255,0.07); border-radius: 12px; padding: 10px; text-align: center; }
.stat-val { font-size: 18px; font-weight: 800; background: linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.lb-row { display: flex; align-items: center; padding: 10px 12px; border-radius: 12px; background: rgba(255,255,255,0.04); margin-bottom: 7px; border: 1px solid transparent; }
.lb-row.top { background: rgba(167,139,250,0.15); border-color: rgba(167,139,250,0.3); }
.lb-rank { font-size: 18px; width: 28px; }
.lb-name { flex: 1; margin-left: 8px; }
.lb-name strong { font-size: 14px; display: block; }
.lb-name small { font-size: 10px; color: rgba(255,255,255,0.4); }
.lb-score { font-weight: 800; font-size: 16px; background: linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.streak-badge { font-size: 12px; color: #facc15; font-weight: 700; }
.cat-tabs { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; }
.cat-tab { padding: 5px 12px; border-radius: 99px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color: rgba(255,255,255,0.5); font-size: 11px; cursor: pointer; white-space: nowrap; }
.cat-tab.active { background: linear-gradient(135deg,#a78bfa,#60a5fa); color: #fff; border-color: transparent; }
.cat-tabs::-webkit-scrollbar { display: none; }
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.mode-card { padding: 12px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); cursor: pointer; text-align: center; }
.mode-card.active { border-color: #a78bfa; background: rgba(167,139,250,0.15); }
.mode-icon { font-size: 20px; margin-bottom: 4px; }
.mode-name { font-size: 12px; font-weight: 600; }
.mode-desc { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.timer-toggle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.timer-opt { padding: 12px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
.timer-opt.active { border-color: #a78bfa; background: rgba(167,139,250,0.15); }
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.confirm-box { background: #1e1b3a; border-radius: 20px; padding: 28px 24px; max-width: 320px; width: 100%; text-align: center; border: 1px solid rgba(167,139,250,0.3); }
.confirm-box h3 { font-size: 18px; margin-bottom: 8px; }
.confirm-box p { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 20px; }

/* ========= MENU NAV ========= */
.nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.nav-card {
  padding: 16px 12px; border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05); cursor: pointer; text-align: center;
  transition: all 0.2s;
}
.nav-card:active { transform: scale(0.97); }
.nav-card .nav-icon { font-size: 28px; margin-bottom: 6px; }
.nav-card .nav-label { font-size: 13px; font-weight: 700; }
.nav-card .nav-desc { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 3px; }
.nav-card.purple { border-color: rgba(167,139,250,0.4); background: rgba(167,139,250,0.1); }
.nav-card.blue { border-color: rgba(96,165,250,0.4); background: rgba(96,165,250,0.1); }
.nav-card.green { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.1); }
.nav-card.yellow { border-color: rgba(250,204,21,0.4); background: rgba(250,204,21,0.1); }

/* ========= SUSUN KATA (ANAGRAM) ========= */
.anagram-word {
  font-size: 32px; font-weight: 800; text-align: center; letter-spacing: 6px;
  background: linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px; padding: 16px;
}
.anagram-hint { text-align: center; color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 16px; }
.letter-slots {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  min-height: 52px; padding: 10px; border-radius: 14px;
  border: 2px dashed rgba(167,139,250,0.3);
  background: rgba(255,255,255,0.03); margin-bottom: 14px;
}
.letter-bank {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  min-height: 52px; padding: 10px; border-radius: 14px;
  border: 2px dashed rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03); margin-bottom: 16px;
}
.letter-tile {
  width: 38px; height: 42px; border-radius: 10px;
  background: linear-gradient(135deg,rgba(167,139,250,0.3),rgba(96,165,250,0.3));
  border: 1px solid rgba(167,139,250,0.4);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; cursor: pointer;
  user-select: none; transition: all 0.15s;
  color: #fff;
}
.letter-tile:active { transform: scale(0.9); }
.letter-tile.placed {
  background: linear-gradient(135deg,rgba(74,222,128,0.2),rgba(34,197,94,0.2));
  border-color: #4ade80;
}
.letter-tile.empty {
  background: rgba(255,255,255,0.03);
  border: 2px dashed rgba(255,255,255,0.15);
  color: transparent; cursor: default;
}
.letter-tile.correct-flash { background: rgba(74,222,128,0.4) !important; border-color: #4ade80 !important; }
.letter-tile.wrong-flash { background: rgba(248,113,113,0.4) !important; border-color: #f87171 !important; }
.anagram-result { text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 12px; min-height: 24px; }
.anagram-result.correct { color: #4ade80; }
.anagram-result.wrong { color: #f87171; }

/* ========= SUSUN KALIMAT ========= */
.sentence-prompt {
  background: rgba(255,255,255,0.07); border-radius: 14px;
  padding: 16px; margin-bottom: 14px; text-align: center;
}
.sentence-prompt .prompt-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
.sentence-prompt .prompt-text { font-size: 15px; font-weight: 600; }
.word-slots {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  min-height: 48px; padding: 10px; border-radius: 14px;
  border: 2px dashed rgba(167,139,250,0.3);
  background: rgba(255,255,255,0.03); margin-bottom: 12px;
}
.word-bank {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
  padding: 10px; border-radius: 14px;
  border: 2px dashed rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.03); margin-bottom: 14px;
}
.word-tile {
  padding: 8px 14px; border-radius: 10px;
  background: linear-gradient(135deg,rgba(167,139,250,0.25),rgba(96,165,250,0.25));
  border: 1px solid rgba(167,139,250,0.4);
  font-size: 14px; font-weight: 600; cursor: pointer;
  user-select: none; transition: all 0.15s; color: #fff;
}
.word-tile:active { transform: scale(0.93); }
.word-tile.placed {
  background: linear-gradient(135deg,rgba(74,222,128,0.2),rgba(34,197,94,0.2));
  border-color: rgba(74,222,128,0.5);
}
.word-tile.slot-empty {
  background: rgba(255,255,255,0.03);
  border: 2px dashed rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.2); cursor: default; min-width: 60px;
}
.sentence-result { text-align: center; font-size: 13px; font-weight: 600; margin-bottom: 10px; min-height: 20px; }
.sentence-result.correct { color: #4ade80; }
.sentence-result.wrong { color: #f87171; }
.correct-answer { background: rgba(74,222,128,0.1); border-radius: 10px; padding: 8px 12px; font-size: 12px; color: #4ade80; text-align: center; margin-bottom: 12px; }

/* ========= GOETHE PRÜFUNG ========= */
.goethe-header {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid rgba(255,215,0,0.3);
  border-radius: 16px; padding: 16px; margin-bottom: 16px; text-align: center;
}
.goethe-logo { font-size: 32px; margin-bottom: 4px; }
.goethe-title { font-size: 18px; font-weight: 800; color: #ffd700; }
.goethe-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.pruefung-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.pruefung-card {
  padding: 18px 12px; border-radius: 16px; text-align: center; cursor: pointer;
  border: 2px solid; transition: all 0.2s;
}
.pruefung-card:active { transform: scale(0.97); }
.pruefung-card .p-icon { font-size: 32px; margin-bottom: 8px; }
.pruefung-card .p-name { font-size: 14px; font-weight: 800; }
.pruefung-card .p-desc { font-size: 10px; margin-top: 3px; opacity: 0.7; }
.pruefung-card .p-info { font-size: 10px; margin-top: 6px; opacity: 0.5; }
/* Lesen styles */
.lesen-text {
  background: rgba(255,255,255,0.06); border-radius: 14px;
  padding: 16px; margin-bottom: 14px; font-size: 14px;
  line-height: 1.7; color: rgba(255,255,255,0.9);
  border-left: 3px solid #60a5fa;
}
.lesen-text .text-label {
  font-size: 10px; color: #60a5fa; font-weight: 700;
  letter-spacing: 1px; margin-bottom: 8px;
}
.lesen-q { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
.lesen-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.lesen-opt {
  padding: 11px 14px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06); color: #fff;
  font-size: 13px; cursor: pointer; text-align: left; transition: all 0.2s;
}
.lesen-opt.correct { background: rgba(74,222,128,0.2); border-color: #4ade80; color: #4ade80; }
.lesen-opt.wrong { background: rgba(248,113,113,0.2); border-color: #f87171; color: #f87171; }
.lesen-opt:disabled { cursor: default; }
.richtig-falsch { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.rf-btn {
  padding: 14px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.06); color: #fff; font-size: 15px;
  font-weight: 800; cursor: pointer; text-align: center;
}
.rf-btn.correct { background: rgba(74,222,128,0.2); border-color: #4ade80; color: #4ade80; }
.rf-btn.wrong { background: rgba(248,113,113,0.2); border-color: #f87171; color: #f87171; }
/* Schreiben styles */
.schreiben-prompt {
  background: rgba(255,255,255,0.06); border-radius: 14px;
  padding: 16px; margin-bottom: 14px;
  border-left: 3px solid #a78bfa;
}
.schreiben-prompt .prompt-type {
  font-size: 10px; color: #a78bfa; font-weight: 700;
  letter-spacing: 1px; margin-bottom: 6px;
}
.schreiben-prompt .prompt-text { font-size: 14px; font-weight: 600; line-height: 1.5; }
.schreiben-prompt .prompt-hint { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 6px; }
.schreiben-area {
  width: 100%; min-height: 100px; padding: 14px;
  border-radius: 14px; border: 2px solid rgba(167,139,250,0.3);
  background: rgba(255,255,255,0.05); color: #fff;
  font-size: 14px; line-height: 1.6; resize: vertical;
  font-family: inherit; margin-bottom: 12px; outline: none;
}
.schreiben-area:focus { border-color: #a78bfa; }
.schreiben-area::placeholder { color: rgba(255,255,255,0.25); }
.schreiben-feedback {
  border-radius: 14px; padding: 14px; margin-bottom: 12px;
  font-size: 13px; line-height: 1.6; display: none;
}
.schreiben-feedback.show { display: block; }
.schreiben-feedback.correct { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); }
.schreiben-feedback.partial { background: rgba(250,204,21,0.1); border: 1px solid rgba(250,204,21,0.3); }
.schreiben-feedback .fb-label { font-weight: 800; margin-bottom: 6px; }
.schreiben-feedback .fb-musterloesung { color: rgba(255,255,255,0.6); margin-top: 8px; font-size: 12px; }
.schreiben-feedback .fb-musterloesung strong { color: #a78bfa; }
.word-count { font-size: 11px; color: rgba(255,255,255,0.3); text-align: right; margin-top: -10px; margin-bottom: 12px; }
/* ========= XP / STREAK / LEVEL ========= */
.xp-bar-wrap { background:rgba(255,255,255,0.08); border-radius:99px; height:8px; margin:6px 0 2px; overflow:hidden; }
.xp-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#a78bfa,#60a5fa); transition:width 0.5s ease; }
.level-badge { display:inline-flex; align-items:center; gap:5px; background:linear-gradient(135deg,#a78bfa,#60a5fa); border-radius:99px; padding:4px 12px; font-size:12px; font-weight:800; }
.streak-fire { font-size:22px; }
.home-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:14px; }
.home-stat { background:rgba(255,255,255,0.06); border-radius:14px; padding:10px 8px; text-align:center; border:1px solid rgba(255,255,255,0.08); }
.home-stat-val { font-size:20px; font-weight:800; background:linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.home-stat-lbl { font-size:10px; color:rgba(255,255,255,0.4); margin-top:2px; }
/* ========= PROGRESS TRACKER ========= */
.progress-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.progress-row .cat-name { width:80px; font-size:12px; color:rgba(255,255,255,0.7); flex-shrink:0; }
.progress-row .p-bar { flex:1; height:8px; background:rgba(255,255,255,0.08); border-radius:99px; overflow:hidden; }
.progress-row .p-fill { height:100%; border-radius:99px; transition:width 0.4s; }
.progress-row .p-pct { width:36px; text-align:right; font-size:11px; font-weight:700; flex-shrink:0; }
/* ========= VERBEN / KASUS ========= */
.kasus-badge { display:inline-block; padding:3px 12px; border-radius:99px; font-size:11px; font-weight:800; letter-spacing:1px; margin-bottom:10px; }
.kasus-NOM { background:rgba(96,165,250,0.2); color:#60a5fa; border:1px solid rgba(96,165,250,0.4); }
.kasus-AKK { background:rgba(167,139,250,0.2); color:#a78bfa; border:1px solid rgba(167,139,250,0.4); }
.kasus-DAT { background:rgba(74,222,128,0.2); color:#4ade80; border:1px solid rgba(74,222,128,0.4); }
.kasus-question { font-size:17px; font-weight:700; line-height:1.6; margin-bottom:14px; background:rgba(255,255,255,0.05); border-radius:14px; padding:14px; border-left:3px solid rgba(255,255,255,0.15); }
.kasus-blank { display:inline-block; min-width:60px; border-bottom:2px solid #a78bfa; color:#a78bfa; font-weight:800; text-align:center; padding:0 4px; }
.kasus-tip { font-size:11px; color:rgba(255,255,255,0.35); margin-bottom:12px; background:rgba(255,255,255,0.04); border-radius:10px; padding:8px 12px; line-height:1.6; }
/* ========= KAMUS ========= */
.kamus-result { background:rgba(255,255,255,0.06); border-radius:16px; padding:14px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.08); }
.kamus-word { font-size:22px; font-weight:800; margin-bottom:2px; }
.kamus-artikel { color:#a78bfa; font-weight:700; font-size:14px; }
.kamus-meaning { font-size:15px; color:#4ade80; font-weight:600; margin:4px 0; }
.kamus-cat { display:inline-block; background:rgba(96,165,250,0.15); color:#60a5fa; border-radius:99px; padding:2px 10px; font-size:10px; font-weight:700; margin-bottom:6px; }
.kamus-example { font-size:12px; color:rgba(255,255,255,0.5); font-style:italic; margin-top:6px; border-top:1px solid rgba(255,255,255,0.06); padding-top:6px; }
.kamus-emoji { font-size:28px; float:right; margin-left:8px; }
/* ========= FLASHCARD ========= */
.flashcard-wrap { perspective:1000px; width:100%; height:160px; cursor:pointer; margin-bottom:16px; }
.flashcard-inner { position:relative; width:100%; height:100%; transition:transform 0.5s; transform-style:preserve-3d; }
.flashcard-wrap.flipped .flashcard-inner { transform:rotateY(180deg); }
.flashcard-front, .flashcard-back {
  position:absolute; inset:0; backface-visibility:hidden;
  border-radius:20px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px; padding:20px;
}
.flashcard-front { background:linear-gradient(135deg,rgba(167,139,250,0.2),rgba(96,165,250,0.2)); border:2px solid rgba(167,139,250,0.3); }
.flashcard-back { background:linear-gradient(135deg,rgba(74,222,128,0.15),rgba(34,197,94,0.15)); border:2px solid rgba(74,222,128,0.3); transform:rotateY(180deg); }
.fc-emoji { font-size:52px; }
.fc-word { font-size:26px; font-weight:800; }
.fc-hint { font-size:12px; color:rgba(255,255,255,0.4); }
.fc-answer { font-size:20px; font-weight:700; color:#4ade80; }
.fc-artikel { font-size:14px; color:#a78bfa; font-weight:700; }
.fc-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.fc-btn-know { padding:13px; border-radius:14px; border:2px solid rgba(74,222,128,0.4); background:rgba(74,222,128,0.1); color:#4ade80; font-size:14px; font-weight:700; cursor:pointer; }
.fc-btn-dunno { padding:13px; border-radius:14px; border:2px solid rgba(248,113,113,0.4); background:rgba(248,113,113,0.1); color:#f87171; font-size:14px; font-weight:700; cursor:pointer; }
/* ========= SINONIM MATCHING ========= */
.syn-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 16px;
}
.syn-col-label {
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
  text-align: center; margin-bottom: 6px; letter-spacing: 1px;
}
.syn-tile {
  padding: 12px 8px; border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.07); color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer;
  text-align: center; transition: all 0.2s; min-height: 48px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1.3;
}
.syn-tile.selected {
  border-color: #a78bfa; background: rgba(167,139,250,0.25);
  transform: scale(1.03);
}
.syn-tile.matched {
  border-color: #4ade80; background: rgba(74,222,128,0.15);
  color: #4ade80; cursor: default;
}
.syn-tile.wrong-flash {
  border-color: #f87171; background: rgba(248,113,113,0.2);
  color: #f87171;
}
.syn-tile.disabled { opacity: 0.3; cursor: default; }
.syn-progress {
  display: flex; gap: 6px; justify-content: center; margin-bottom: 14px;
}
.syn-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.15); transition: background 0.3s;
}
.syn-dot.done { background: #4ade80; }
/* ========= TEMBAK GAMBAR ========= */
.img-stage {
  width: 100%; height: 200px; border-radius: 16px; overflow: hidden;
  margin-bottom: 14px; position: relative;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
}
.img-stage img {
  width: 100%; height: 100%; object-fit: cover;
  border-radius: 16px; transition: opacity 0.3s;
}
.img-stage .img-loading {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 8px;
  color: rgba(255,255,255,0.4); font-size: 13px;
}
.img-stage .img-cat {
  position: absolute; bottom: 8px; right: 10px;
  background: rgba(0,0,0,0.5); border-radius: 99px;
  padding: 3px 10px; font-size: 11px; color: rgba(255,255,255,0.7);
}
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #a78bfa; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes popIn { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
.emoji-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-bottom: 10px;
}
.emoji-opt {
  padding: 14px 10px; border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.07); color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
  text-align: center; transition: all 0.2s; line-height: 1.3;
}
.emoji-opt:active { transform: scale(0.96); }
.emoji-opt.correct { background: rgba(74,222,128,0.2); border-color: #4ade80; color: #4ade80; }
.emoji-opt.wrong   { background: rgba(248,113,113,0.2); border-color: #f87171; color: #f87171; }
.emoji-opt:disabled { cursor: default; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.shake { animation: shake 0.4s; }
@keyframes pop { 0%{transform:scale(0.95);opacity:0} 100%{transform:scale(1);opacity:1} }
.pop { animation: pop 0.2s ease-out; }
@keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
@keyframes toastAnim { 0%{opacity:0;transform:translateY(10px)} 20%{opacity:1;transform:translateY(0)} 80%{opacity:1} 100%{opacity:0;transform:translateY(-10px)} }
.bounce { animation: bounce 0.3s; }
</style>

// ======== QUIZ ========
function buildPool(){
  let p=st.cat==="Semua"?UNIQUE_VOCAB:UNIQUE_VOCAB.filter(v=>v.c===st.cat);
  if(st.qmode==="artikel") p=p.filter(v=>["der","die","das"].includes(v.a));
  return shuffle(p);
}
function nextVocab(){
  if(st.pool.length===0||st.used.size>=st.pool.length){st.pool=buildPool();st.used.clear();}
  if(st.pool.length===0){
    // fallback: ignore category/mode filter
    st.pool=shuffle([...UNIQUE_VOCAB]);st.used.clear();
  }
  for(const v of st.pool){if(!st.used.has(v.w)){st.used.add(v.w);return v;}}
  st.pool=shuffle([...UNIQUE_VOCAB]);st.used.clear();
  return st.pool[0]||UNIQUE_VOCAB[0];
}
function makeQuestion(vocab){
  const pool=UNIQUE_VOCAB.filter(v=>v.w!==vocab.w);
  if(st.qmode==="meaning"){
    const wrongs=shuffle(pool).slice(0,3).map(v=>v.m);
    const opts=shuffle([vocab.m,...wrongs]);
    return {...vocab,opts,ans:opts.indexOf(vocab.m)};
  } else {
    const opts=["der","die","das"];
    return {...vocab,opts,ans:opts.indexOf(vocab.a)};
  }
}
function startQuiz(){
  clearTimer();
  st.pool=buildPool();st.used=new Set();
  st.qNum=0;st.correct=0;st.wrong=0;st.score=0;
  st.streak=0;st.bestStreak=0;st.answered=false;st.selected=null;
  st.screen="quiz"; loadNext();
}
function loadNext(){
  st.q=makeQuestion(nextVocab());
  st.qNum++;st.answered=false;st.selected=null;st.timer=TIMER_SEC;
  render();if(st.timerOn)startTimer();
}
function renderQuiz(){
  const q=st.q;if(!q)return"";
  const pct=st.timerOn?(st.timer/TIMER_SEC)*100:100;
  const tc=st.timer>8?"#4ade80":st.timer>4?"#facc15":"#f87171";
  const letters=["A","B","C","D"];
  const qLabel=st.qmode==="meaning"
    ?`Arti dari <strong>${q.a!=="-"?q.a+" ":""}${q.w}</strong>?`
    :`Artikel yang tepat untuk <strong>${q.w}</strong>?`;
  const opts=q.opts.map((o,i)=>{
    let cls="opt-btn",suf="";
    if(st.answered){if(i===q.ans){cls+=" correct";suf=" ✓";}else if(i===st.selected&&i!==q.ans){cls+=" wrong";suf=" ✗";}}
    return`<button class="${cls}" ${st.answered?"disabled":""} onclick="handleAns(${i})">${st.qmode==="artikel"?o:`${letters[i]}. ${o}`}${suf}</button>`;
  }).join("");
  const streakHtml=st.streak>=2?`<span class="streak-badge">🔥${st.streak}</span>`:"";
  return`
    <button class="close-btn" onclick="askClose()">✕</button>
    <div class="meta" style="padding-right:36px">
      <span>Soal <span class="badge">#${st.qNum}</span></span>
      ${streakHtml}
      <span>Skor <span class="badge">${st.score}</span></span>
    </div>
    <div class="meta" style="margin-top:-6px">
      <span style="color:#4ade80">✓ ${st.correct}</span>
      <span style="font-size:11px">${st.cat} · ${st.qmode==="meaning"?"Arti":"Artikel"}</span>
      <span style="color:#f87171">✗ ${st.wrong}</span>
    </div>
    ${st.timerOn?`<div class="timer-bar"><div class="timer-fill" id="tf" style="width:${pct}%;background:${tc}"></div></div><div class="timer-text" id="tt" style="color:${tc}">${st.timer}s</div>`:""}
    <div class="q-card">
      <div class="q-emoji">${q.e}</div>
      <div class="q-text">${qLabel}</div>
      <div class="q-cat">${q.c}</div>
    </div>
    ${opts}
  `;
}
function startTimer(){
  clearTimer();
  st.tid=setInterval(()=>{
    st.timer--;
    if(st.timer<=0){
      clearTimer();
      if(!st.answered){st.answered=true;st.wrong++;st.streak=0;render();shakeCard();setTimeout(loadNext,1000);}
    } else {
      const tf=document.getElementById("tf"),tt=document.getElementById("tt");
      if(tf&&tt){const pct=(st.timer/TIMER_SEC)*100,tc=st.timer>8?"#4ade80":st.timer>4?"#facc15":"#f87171";tf.style.width=pct+"%";tf.style.background=tc;tt.style.color=tc;tt.textContent=st.timer+"s";}
    }
  },1000);
}
function clearTimer(){if(st.tid){clearInterval(st.tid);st.tid=null;}}
function handleAns(idx){
  if(st.answered)return;
  clearTimer();st.selected=idx;st.answered=true;
  const correct=idx===st.q.ans;
  if(correct){st.correct++;st.streak++;if(st.streak>st.bestStreak)st.bestStreak=st.streak;const bonus=st.streak>=3?20:st.streak>=2?10:0;const earned=10+(st.timerOn?Math.floor(st.timer*0.5):0)+bonus;st.score+=earned;playSound("correct");showXPToast(Math.round(earned/2));addXP(Math.round(earned/2),st.q.c);}
  else{st.wrong++;st.streak=0;addWrongStat(st.q.c);playSound("wrong");shakeCard();}
  render();setTimeout(loadNext,900);
}
function renderResult(){
  checkAchievements({totalCorrect: st.correct});
  const acc=st.qNum>0?Math.round((st.correct/st.qNum)*100):0;
  const grade=acc>=80?"Ausgezeichnet! 🎉":acc>=60?"Gut gemacht! 👍":acc>=40?"Weiter üben! 💪":"Noch mehr üben! 📚";
  return`
    <div class="title">Hasil Quiz</div>
    <div class="subtitle">${st.name?`Hallo, ${st.name}!`:"Quiz selesai!"}</div>
    <div class="score-circle"><div class="score-num">${st.score}</div><div class="score-label">poin</div></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${st.qNum}</div><div class="stat-lbl">Soal</div></div>
      <div class="stat-box"><div class="stat-val">${acc}%</div><div class="stat-lbl">Akurasi</div></div>
      <div class="stat-box"><div class="stat-val">${st.bestStreak}🔥</div><div class="stat-lbl">Best Streak</div></div>
    </div>
    <div class="grade">${grade}</div>
    <div class="grade-sub">Benar: ${st.correct} · Salah: ${st.wrong}</div>
    <button class="btn-primary" onclick="startQuiz()">Main Lagi 🔁</button>
    <button class="btn-secondary" onclick="goTo('leaderboard')">🏆 Leaderboard</button>
    <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>
  `;
}

// ======== ANAGRAM ========
function nextAnagramWord(){
  const pool=UNIQUE_VOCAB.filter(v=>v.w.length>=4&&v.w.length<=8&&!st.anUsedWords.has(v.w));
  if(pool.length===0){st.anUsedWords.clear();return nextAnagramWord();}
  const v=pool[Math.floor(Math.random()*pool.length)];
  st.anUsedWords.add(v.w);return v;
}
function startAnagram(){
  st.anCorrect=0;st.anWrong=0;st.anNum=0;st.anScore=0;st.anUsedWords=new Set();
  st.screen="anagram";loadAnagram();
}
function loadAnagram(){
  const v=nextAnagramWord();
  st.anWord=v;
  const letters=v.w.toUpperCase().split("");
  st.anLetters=shuffle([...letters]);
  // Make sure shuffled differs from original
  let attempts=0;
  while(st.anLetters.join("")===v.w.toUpperCase()&&attempts<10){st.anLetters=shuffle([...letters]);attempts++;}
  st.anPlaced=new Array(letters.length).fill(null);
  st.anUsed=new Array(st.anLetters.length).fill(false);
  st.anNum++;render();
}
function renderAnagram(){
  const v=st.anWord;if(!v)return"";
  const placedHtml=st.anPlaced.map((l,i)=>{
    if(l!==null)return`<div class="letter-tile placed" onclick="anagramRemove(${i})">${l}</div>`;
    return`<div class="letter-tile empty">_</div>`;
  }).join("");
  const bankHtml=st.anLetters.map((l,i)=>{
    if(st.anUsed[i])return`<div class="letter-tile empty" style="opacity:0.2">${l}</div>`;
    return`<div class="letter-tile" onclick="anagramPlace(${i})">${l}</div>`;
  }).join("");
  return`
    <button class="close-btn" onclick="finishAnagram()">✕</button>
    <div class="meta" style="padding-right:36px">
      <span>Soal <span class="badge">#${st.anNum}</span></span>
      <span>Skor <span class="badge">${st.anScore}</span></span>
    </div>
    <div class="meta" style="margin-top:-6px">
      <span style="color:#4ade80">✓ ${st.anCorrect}</span>
      <span style="font-size:11px">Susun Huruf</span>
      <span style="color:#f87171">✗ ${st.anWrong}</span>
    </div>
    <div class="q-card">
      <div class="q-emoji">${v.e}</div>
      <div class="q-text">Susun huruf-huruf ini!</div>
      <div class="q-cat">${v.a !== "-" ? `<span style="background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800">${v.a}</span> ___` : "___"} · ${v.m} · ${v.c}</div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;text-align:center">Jawaban kamu:</div>
    <div class="letter-slots" id="anSlots">${placedHtml}</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;text-align:center">Huruf tersedia:</div>
    <div class="letter-bank" id="anBank">${bankHtml}</div>
    <div class="anagram-result" id="anResult"></div>
    <button class="btn-secondary" style="margin-top:0" onclick="anagramClear()">🔄 Reset</button>
  `;
}
function anagramPlace(bankIdx){
  if(st.anUsed[bankIdx])return;
  const emptySlot=st.anPlaced.indexOf(null);
  if(emptySlot===-1)return;
  st.anUsed[bankIdx]=true;
  st.anPlaced[emptySlot]=st.anLetters[bankIdx];
  st.anPlaced._bankRef=st.anPlaced._bankRef||{};
  // Track which bank index goes to which slot
  if(!st._anMap)st._anMap=[];
  st._anMap[emptySlot]=bankIdx;
  render();
  // Check if all placed
  if(st.anPlaced.indexOf(null)===-1){
    setTimeout(checkAnagram,200);
  }
}
function anagramRemove(slotIdx){
  if(st.anPlaced[slotIdx]===null)return;
  // Find bank idx
  const bankIdx=st._anMap?st._anMap[slotIdx]:null;
  if(bankIdx!==null&&bankIdx!==undefined)st.anUsed[bankIdx]=false;
  st.anPlaced[slotIdx]=null;
  if(st._anMap)st._anMap[slotIdx]=undefined;
  render();
}
function anagramClear(){
  st.anPlaced=new Array(st.anWord.w.length).fill(null);
  st.anUsed=new Array(st.anLetters.length).fill(false);
  st._anMap=[];render();
}
function checkAnagram(){
  const answer=st.anPlaced.join("").toUpperCase();
  const correct=st.anWord.w.toUpperCase();
  if(answer===correct){
    st.anCorrect++;st.anScore+=20;playSound("correct");showXPToast(10);addXP(10,st.anWord.c);
    // Flash green
    document.querySelectorAll("#anSlots .letter-tile").forEach(t=>{t.classList.add("correct-flash");});
    setTimeout(loadAnagram,900);
  } else {
    st.anWrong++;addWrongStat(st.anWord.c);playSound("wrong");
    document.querySelectorAll("#anSlots .letter-tile").forEach(t=>{t.classList.add("wrong-flash");});
    shakeCard();
    setTimeout(()=>{
      anagramClear();
    },700);
  }
}
function finishAnagram(){
  clearTimer();
  saveSessionLB("Anagram");
  st.screen="anagram_result";render();
}
function renderAnagramResult(){
  const acc=st.anNum>0?Math.round((st.anCorrect/st.anNum)*100):0;
  const grade=acc>=80?"Ausgezeichnet! 🎉":acc>=60?"Gut gemacht! 👍":"Weiter üben! 💪";
  return`
    <div class="title">Hasil Anagram</div>
    <div class="subtitle">${st.name?`Hallo, ${st.name}!`:"Selesai!"}</div>
    <div class="score-circle"><div class="score-num">${st.anScore}</div><div class="score-label">poin</div></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${st.anNum}</div><div class="stat-lbl">Soal</div></div>
      <div class="stat-box"><div class="stat-val">${acc}%</div><div class="stat-lbl">Akurasi</div></div>
      <div class="stat-box"><div class="stat-val">${st.anCorrect}</div><div class="stat-lbl">Benar</div></div>
    </div>
    <div class="grade">${grade}</div>
    <button class="btn-primary" onclick="startAnagram()">Main Lagi 🔁</button>
    <button class="btn-secondary" onclick="goTo('leaderboard')">🏆 Leaderboard</button>
    <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>
  `;
}

// ======== SUSUN KALIMAT ========
function nextSentence(){
  const pool=SENTENCES.filter(s=>!st.sentUsed.has(s.id));
  if(pool.length===0){st.sentUsed.clear();return nextSentence();}
  const s=pool[Math.floor(Math.random()*pool.length)];
  st.sentUsed.add(s.id);return s;
}
function startSentence(){
  st.sentCorrect=0;st.sentWrong=0;st.sentNum=0;st.sentScore=0;st.sentUsed=new Set();
  st.screen="sentence";loadSentence();
}
function loadSentence(){
  const s=nextSentence();
  st.sent=s;
  st.sentBank=shuffle([...s.de].map((w,i)=>({w,i,id:i+"-"+Math.random()})));
  st.sentPlaced=[];
  st.sentNum++;render();
}
function renderSentence(){
  const s=st.sent;if(!s)return"";
  const placedHtml=st.sentPlaced.length===0
    ?`<div style="color:rgba(255,255,255,0.2);font-size:13px;align-self:center">Tap kata di bawah untuk menyusun</div>`
    :st.sentPlaced.map((t,i)=>`<div class="word-tile placed" onclick="sentRemove(${i})">${t.w}</div>`).join("");
  const bankHtml=st.sentBank.map((t,i)=>
    `<div class="word-tile" onclick="sentPlace(${i})">${t.w}</div>`
  ).join("");
  return`
    <button class="close-btn" onclick="finishSentence()">✕</button>
    <div class="meta" style="padding-right:36px">
      <span>Soal <span class="badge">#${st.sentNum}</span></span>
      <span>Skor <span class="badge">${st.sentScore}</span></span>
    </div>
    <div class="meta" style="margin-top:-6px">
      <span style="color:#4ade80">✓ ${st.sentCorrect}</span>
      <span style="font-size:11px">Susun Kalimat</span>
      <span style="color:#f87171">✗ ${st.sentWrong}</span>
    </div>
    <div class="sentence-prompt">
      <div class="prompt-label">🇮🇩 Artinya:</div>
      <div class="prompt-text">${s.hint}</div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;text-align:center">Kalimat kamu (tap untuk hapus):</div>
    <div class="word-slots" id="sentSlots">${placedHtml}</div>
    <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:6px;text-align:center">Kata tersedia (tap untuk pilih):</div>
    <div class="word-bank" id="sentBank">${bankHtml}</div>
    <div class="sentence-result" id="sentResult"></div>
    <button class="btn-primary" onclick="checkSentence()" ${st.sentPlaced.length===0?"disabled":""} style="${st.sentPlaced.length===0?"opacity:0.4":""}" >✓ Cek Jawaban</button>
    <button class="btn-secondary" style="margin-top:8px" onclick="sentClear()">🔄 Reset</button>
  `;
}
function sentPlace(bankIdx){
  const tile=st.sentBank[bankIdx];
  if(!tile)return;
  st.sentPlaced.push(tile);
  st.sentBank.splice(bankIdx,1);
  render();
}
function sentRemove(placedIdx){
  const tile=st.sentPlaced[placedIdx];
  if(!tile)return;
  st.sentPlaced.splice(placedIdx,1);
  st.sentBank.push(tile);
  render();
}
function sentClear(){
  st.sentBank=[...st.sentBank,...st.sentPlaced];
  st.sentPlaced=[];render();
}
function checkSentence(){
  const answer=st.sentPlaced.map(t=>t.w).join(" ");
  const correct=st.sent.de.join(" ");
  const res=document.getElementById("sentResult");
  if(answer===correct){
    st.sentCorrect++;st.sentScore+=15;playSound("correct");showXPToast(8);addXP(8,'Kalimat');
    if(res){res.className="sentence-result correct";res.textContent="✓ Benar! Luar biasa!";}
    setTimeout(loadSentence,900);
  } else {
    st.sentWrong++;
    if(res){res.className="sentence-result wrong";res.innerHTML=`✗ Salah! Jawaban: <strong>${correct}</strong>`;}
    shakeCard();
    setTimeout(()=>{sentClear();if(res)res.textContent="";},1200);
  }
}
function finishSentence(){
  saveSessionLB("Kalimat");
  st.screen="sentence_result";render();
}
function renderSentenceResult(){
  const acc=st.sentNum>0?Math.round((st.sentCorrect/st.sentNum)*100):0;
  const grade=acc>=80?"Ausgezeichnet! 🎉":acc>=60?"Gut gemacht! 👍":"Weiter üben! 💪";
  return`
    <div class="title">Hasil Kalimat</div>
    <div class="subtitle">${st.name?`Hallo, ${st.name}!`:"Selesai!"}</div>
    <div class="score-circle"><div class="score-num">${st.sentScore}</div><div class="score-label">poin</div></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${st.sentNum}</div><div class="stat-lbl">Soal</div></div>
      <div class="stat-box"><div class="stat-val">${acc}%</div><div class="stat-lbl">Akurasi</div></div>
      <div class="stat-box"><div class="stat-val">${st.sentCorrect}</div><div class="stat-lbl">Benar</div></div>
    </div>
    <div class="grade">${grade}</div>
    <button class="btn-primary" onclick="startSentence()">Main Lagi 🔁</button>
    <button class="btn-secondary" onclick="goTo('leaderboard')">🏆 Leaderboard</button>
    <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>
  `;
}

function startEmojiGame(){
  st.emNum=0;st.emCorrect=0;st.emWrong=0;st.emScore=0;
  st.emStreak=0;st.emBestStreak=0;st.emUsed=new Set();
  st.screen="emoji"; loadEmojiQ();
}
function nextEmojiVocab(){
  const pool=EMOJI_VOCAB.filter(v=>!st.emUsed.has(v.w));
  if(pool.length===0){st.emUsed.clear();return nextEmojiVocab();}
  const v=pool[Math.floor(Math.random()*pool.length)];
  st.emUsed.add(v.w); return v;
}
function loadEmojiQ(){
  const v=nextEmojiVocab();
  // Wrong options from SAME category first, then any
  let catPool=EMOJI_VOCAB.filter(x=>x.w!==v.w&&x.c===v.c);
  if(catPool.length<3) catPool=[...catPool,...EMOJI_VOCAB.filter(x=>x.w!==v.w&&x.c!==v.c)];
  const wrongs=shuffle(catPool).slice(0,3);
  const opts=shuffle([v,...wrongs]);
  st.emQ={vocab:v, opts, ansIdx:opts.findIndex(o=>o.w===v.w)};
  st.emAnswered=false; st.emSelected=null;
  st.emNum++; render();
}
function renderEmoji(){
  const q=st.emQ; if(!q)return"";
  const streakHtml=st.emStreak>=2?`<span class="streak-badge">🔥${st.emStreak}</span>`:"";
  const optHtml=q.opts.map((o,i)=>{
    let cls="emoji-opt"; let suf="";
    if(st.emAnswered){
      if(i===q.ansIdx){cls+=" correct"; suf=" ✓";}
      else if(i===st.emSelected&&i!==q.ansIdx){cls+=" wrong"; suf=" ✗";}
    }
    const label=o.a&&o.a!=="-"?`${o.a} ${o.w}`:o.w;
    return`<button class="${cls}" ${st.emAnswered?"disabled":""} onclick="handleEmojiAns(${i})">${label}${suf}</button>`;
  }).join("");
  return`
    <button class="close-btn" onclick="finishEmoji()">✕</button>
    <div class="meta" style="padding-right:36px">
      <span>Soal <span class="badge">#${st.emNum}</span></span>
      ${streakHtml}
      <span>Skor <span class="badge">${st.emScore}</span></span>
    </div>
    <div class="meta" style="margin-top:-6px">
      <span style="color:#4ade80">✓ ${st.emCorrect}</span>
      <span style="font-size:11px">Tembak Gambar 🎯</span>
      <span style="color:#f87171">✗ ${st.emWrong}</span>
    </div>
    <div style="width:100%;height:180px;border-radius:20px;background:${q.vocab.bg||'#1e293b'};
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      margin-bottom:14px;position:relative;box-shadow:0 8px 32px rgba(0,0,0,0.3)">
      <div style="font-size:90px;line-height:1;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.3))">${q.vocab.e}</div>
      <div style="position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,0.4);
        border-radius:99px;padding:3px 10px;font-size:11px;color:rgba(255,255,255,0.7)">${q.vocab.c}</div>
    </div>
    <div class="emoji-grid">${optHtml}</div>
  `;
}
function handleEmojiAns(idx){
  if(st.emAnswered)return;
  st.emSelected=idx; st.emAnswered=true;
  const correct=idx===st.emQ.ansIdx;
  if(correct){
    st.emCorrect++; st.emStreak++;
    if(st.emStreak>st.emBestStreak)st.emBestStreak=st.emStreak;
    const bonus=st.emStreak>=3?20:st.emStreak>=2?10:0;
    const emEarned=10+bonus;
    st.emScore+=emEarned;playSound("correct");showXPToast(5);addXP(5,st.emQ.vocab.c);
  } else {
    st.emWrong++; st.emStreak=0; shakeCard();
  }
  render();
  setTimeout(loadEmojiQ, 900);
}
function finishEmoji(){
  const acc=st.emNum>0?Math.round((st.emCorrect/st.emNum)*100):0;
  const entry={name:st.name||"Anonym",score:st.emScore,q:st.emNum,acc,mode:"Tembak Gambar",date:new Date().toLocaleDateString("id-ID")};
  const lb=[...getLB(),entry].sort((a,b)=>b.score-a.score).slice(0,10);
  saveLB(lb);
  st.screen="emoji_result"; render();
}
function renderEmojiResult(){
  checkAchievements({totalCorrect: st.emCorrect});
  const acc=st.emNum>0?Math.round((st.emCorrect/st.emNum)*100):0;
  const grade=acc>=80?"Ausgezeichnet! 🎉":acc>=60?"Gut gemacht! 👍":"Weiter üben! 💪";
  return`
    <div class="title">Hasil Tembak Gambar</div>
    <div class="subtitle">${st.name?`Hallo, ${st.name}!`:"Selesai!"}</div>
    <div class="score-circle"><div class="score-num">${st.emScore}</div><div class="score-label">poin</div></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${st.emNum}</div><div class="stat-lbl">Soal</div></div>
      <div class="stat-box"><div class="stat-val">${acc}%</div><div class="stat-lbl">Akurasi</div></div>
      <div class="stat-box"><div class="stat-val">${st.emBestStreak}🔥</div><div class="stat-lbl">Best Streak</div></div>
    </div>
    <div class="grade">${grade}</div>
    <div class="grade-sub">Benar: ${st.emCorrect} · Salah: ${st.emWrong}</div>
    <button class="btn-primary" onclick="startEmojiGame()">Main Lagi 🔁</button>
    <button class="btn-secondary" onclick="goTo('leaderboard')">🏆 Leaderboard</button>
    <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>
  `;
}

function startSynonym(){
  st.synRound=0; st.synScore=0; st.synCorrect=0; st.synWrong=0;
  st.synUsed=new Set();
  st.screen="synonym"; loadSynRound();
}

function loadSynRound(){
  // Pick 4 unused pairs
  const pool=SYNONYM_PAIRS.filter(p=>!st.synUsed.has(p.a));
  if(pool.length<4){ st.synUsed.clear(); }
  const picked=shuffle(SYNONYM_PAIRS.filter(p=>!st.synUsed.has(p.a))).slice(0,4);
  picked.forEach(p=>st.synUsed.add(p.a));
  // Left col = a words shuffled, Right col = b words shuffled
  const leftWords=shuffle(picked.map(p=>p.a));
  const rightWords=shuffle(picked.map(p=>p.b));
  st.synPairs=picked;
  st.synLeft=leftWords;
  st.synRight=rightWords;
  st.synLeftSel=null; st.synRightSel=null;
  st.synMatched=[];
  st.synRound++; render();
}

function renderSynonym(){
  const dots=Array.from({length:4},(_,i)=>
    `<div class="syn-dot ${i<st.synMatched.length?'done':''}"></div>`).join("");
  const leftHtml=st.synLeft.map((w,i)=>{
    const isMatched=st.synMatched.some(m=>m.a===w);
    const isSel=st.synLeftSel===i;
    let cls="syn-tile";
    if(isMatched) cls+=" matched";
    else if(isSel) cls+=" selected";
    return`<div class="${cls}" onclick="synSelLeft(${i})" id="sl${i}">${w}</div>`;
  }).join("");
  const rightHtml=st.synRight.map((w,i)=>{
    const isMatched=st.synMatched.some(m=>m.b===w);
    const isSel=st.synRightSel===i;
    let cls="syn-tile";
    if(isMatched) cls+=" matched";
    else if(isSel) cls+=" selected";
    return`<div class="${cls}" onclick="synSelRight(${i})" id="sr${i}">${w}</div>`;
  }).join("");
  return`
    <button class="close-btn" onclick="finishSynonym()">✕</button>
    <div class="title" style="font-size:22px">Sinonim 🔗</div>
    <div class="subtitle">Cocokkan kata yang bermakna sama</div>
    <div class="meta" style="margin-bottom:12px">
      <span>Ronde <span class="badge">#${st.synRound}</span></span>
      <span>Skor <span class="badge">${st.synScore}</span></span>
    </div>
    <div class="syn-progress">${dots}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">
      <div class="syn-col-label">KATA A</div>
      <div class="syn-col-label">SINONIM</div>
    </div>
    <div class="syn-grid">
      <div style="display:flex;flex-direction:column;gap:10px">${leftHtml}</div>
      <div style="display:flex;flex-direction:column;gap:10px">${rightHtml}</div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center">
      Tap kata di kiri, lalu kata sinonimnya di kanan
    </div>
  `;
}

function synSelLeft(idx){
  const w=st.synLeft[idx];
  if(st.synMatched.some(m=>m.a===w)) return;
  st.synLeftSel=idx;
  render();
  if(st.synRightSel!==null) checkSynMatch();
}

function synSelRight(idx){
  const w=st.synRight[idx];
  if(st.synMatched.some(m=>m.b===w)) return;
  st.synRightSel=idx;
  render();
  if(st.synLeftSel!==null) checkSynMatch();
}

function checkSynMatch(){
  const leftWord=st.synLeft[st.synLeftSel];
  const rightWord=st.synRight[st.synRightSel];
  const pair=st.synPairs.find(p=>p.a===leftWord);
  const correct=pair&&pair.b===rightWord;
  if(correct){
    st.synMatched.push({a:leftWord,b:rightWord});
    st.synScore+=15; st.synCorrect++;playSound("correct");showXPToast(7);addXP(7,'Sinonim');
    st.synLeftSel=null; st.synRightSel=null;
    render();
    if(st.synMatched.length===4){
      setTimeout(()=>{
        st.synScore+=10; // bonus for completing round
        loadSynRound();
      },600);
    }
  } else {
    st.synWrong++;
    // Flash wrong
    const lEl=document.getElementById("sl"+st.synLeftSel);
    const rEl=document.getElementById("sr"+st.synRightSel);
    if(lEl){lEl.classList.add("wrong-flash");}
    if(rEl){rEl.classList.add("wrong-flash");}
    shakeCard();
    setTimeout(()=>{
      st.synLeftSel=null; st.synRightSel=null;
      render();
    },600);
  }
}

function finishSynonym(){
  const acc=st.synCorrect+st.synWrong>0?Math.round((st.synCorrect/(st.synCorrect+st.synWrong))*100):0;
  const entry={name:st.name||"Anonym",score:st.synScore,q:st.synCorrect+st.synWrong,acc,mode:"Sinonim",date:new Date().toLocaleDateString("id-ID")};
  const lb=[...getLB(),entry].sort((a,b)=>b.score-a.score).slice(0,10);
  saveLB(lb);
  st.screen="synonym_result"; render();
}

function renderSynonymResult(){
  checkAchievements({});
  const total=st.synCorrect+st.synWrong;
  const acc=total>0?Math.round((st.synCorrect/total)*100):0;
  const grade=acc>=80?"Ausgezeichnet! 🎉":acc>=60?"Gut gemacht! 👍":"Weiter üben! 💪";
  return`
    <div class="title">Hasil Sinonim</div>
    <div class="subtitle">${st.name?`Hallo, ${st.name}!`:"Selesai!"}</div>
    <div class="score-circle"><div class="score-num">${st.synScore}</div><div class="score-label">poin</div></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${st.synRound}</div><div class="stat-lbl">Ronde</div></div>
      <div class="stat-box"><div class="stat-val">${acc}%</div><div class="stat-lbl">Akurasi</div></div>
      <div class="stat-box"><div class="stat-val">${st.synCorrect}</div><div class="stat-lbl">Benar</div></div>
    </div>
    <div class="grade">${grade}</div>
    <button class="btn-primary" onclick="startSynonym()">Main Lagi 🔁</button>
    <button class="btn-secondary" onclick="goTo('leaderboard')">🏆 Leaderboard</button>
    <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>
  `;
}

// ---- LESEN ----
function startLesen(){
  st.lesenIdx=0; st.lesenQIdx=0; st.lesenAnswered=false;
  st.lesenSel=null; st.lesenCorrect=0; st.lesenWrong=0; st.lesenScore=0;
  // Simulasi: use exactly 12 soal (4 RF + 4 MC + 4 RF), Latihan: all
  st.lesenPool = st.goetheMode==='simulasi'
    ? buildSimulasiLesen()
    : LESEN_AUFGABEN;
  if(st.goetheMode==='simulasi'){
    st.simuSeconds=25*60;
    if(st.simuTimer) clearInterval(st.simuTimer);
    st.simuTimer=setInterval(()=>{
      st.simuSeconds--;
      const el=document.getElementById('simuClock');
      if(el){const m=Math.floor(st.simuSeconds/60),s=st.simuSeconds%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;el.style.color=st.simuSeconds<120?'#f87171':'#facc15';}
      if(st.simuSeconds<=0){clearInterval(st.simuTimer);st.lesenIdx=st.lesenPool.length;render();}
    },1000);
  }
  st.screen='lesen'; render();
}
function buildSimulasiLesen(){
  // Exactly 12: pick 4 RF from Teil1 style, 4 MC from Teil2, 4 RF from Teil3
  const rf = LESEN_AUFGABEN.filter(a=>a.type==='rf');
  const mc = LESEN_AUFGABEN.filter(a=>a.type==='mc');
  const t1 = shuffle(rf).slice(0,4);
  const t2 = shuffle(mc).slice(0,4);
  const t3 = shuffle(rf.filter(a=>!t1.includes(a))).slice(0,4);
  return [...t1,...t2,...t3];
}
function renderLesen(){
  if(st.lesenIdx >= st.lesenPool.length) return renderLesenResult();
  const aufgabe = st.lesenPool[st.lesenIdx];
  const num = st.lesenIdx+1;
  const total = st.lesenPool.length;
  const pct = Math.round((st.lesenIdx/st.lesenPool.length)*100);

  let questionHtml = '';
  if(aufgabe.type === 'mc'){
    const opts = aufgabe.options.map((o,i)=>{
      let cls='lesen-opt';
      if(st.lesenAnswered){ if(i===aufgabe.answer) cls+=' correct'; else if(i===st.lesenSel&&i!==aufgabe.answer) cls+=' wrong'; }
      return`<button class="${cls}" ${st.lesenAnswered?'disabled':''} onclick="handleLesen(${i})">${String.fromCharCode(65+i)}. ${o}</button>`;
    }).join('');
    questionHtml = `<div class="lesen-q">${aufgabe.question}</div><div class="lesen-opts">${opts}</div>`;
  } else {
    const rf = `<div class="lesen-q">${aufgabe.question}</div>
    <div class="richtig-falsch">
      <button class="rf-btn ${st.lesenAnswered?(aufgabe.answer===true?'correct':(st.lesenSel===true?'wrong':'')):''}
      " ${st.lesenAnswered?'disabled':''} onclick="handleLesenRF(true)">✓ Richtig</button>
      <button class="rf-btn ${st.lesenAnswered?(aufgabe.answer===false?'correct':(st.lesenSel===false?'wrong':'')):''}
      " ${st.lesenAnswered?'disabled':''} onclick="handleLesenRF(false)">✗ Falsch</button>
    </div>`;
    questionHtml = rf;
  }

  const nextBtn = st.lesenAnswered
    ? `<button class="btn-primary" onclick="nextLesen()">${st.lesenIdx+1 < st.lesenPool.length ? 'Soal Berikutnya →' : 'Lihat Hasil 🏁'}</button>`
    : '';

  return`
    <button class="close-btn" onclick="goTo('goethe')">✕</button>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <div style="flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#60a5fa,#a78bfa);border-radius:99px;transition:width 0.3s"></div>
      </div>
      <span style="font-size:12px;color:rgba(255,255,255,0.5)">${num}/${total}</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:11px;color:#60a5fa;font-weight:700;letter-spacing:1px">📖 LESEN · ${aufgabe.title}</div>
      ${st.goetheMode==='simulasi'?`<div style="display:flex;align-items:center;gap:5px"><span style="font-size:11px;color:#ffd700">🎯</span><span id="simuClock" style="font-size:13px;font-weight:800;color:#facc15">25:00</span></div>`:''}
    </div>
    <div class="lesen-text">
      <div class="text-label">TEXT</div>
      ${aufgabe.text.split('\n').join('<br>')}
    </div>
    ${questionHtml}
    <div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:10px">
      <span style="color:#4ade80">✓ ${st.lesenCorrect}</span>
      <span style="color:#f87171">✗ ${st.lesenWrong}</span>
    </div>
    ${nextBtn}
  `;
}
function handleLesen(idx){
  if(st.lesenAnswered) return;
  st.lesenSel=idx; st.lesenAnswered=true;
  if(idx===st.lesenPool[st.lesenIdx].answer){ st.lesenCorrect++; st.lesenScore+=10;playSound("correct");showXPToast(5);addXP(5,'Lesen'); }
  else{ st.lesenWrong++; shakeCard(); }
  render();
}
function handleLesenRF(val){
  if(st.lesenAnswered) return;
  st.lesenSel=val; st.lesenAnswered=true;
  if(val===st.lesenPool[st.lesenIdx].answer){ st.lesenCorrect++; st.lesenScore+=10;playSound("correct");showXPToast(5);addXP(5,'Lesen'); }
  else{ st.lesenWrong++; shakeCard(); }
  render();
}
function nextLesen(){
  st.lesenIdx++; st.lesenAnswered=false; st.lesenSel=null;
  if(st.lesenIdx>=st.lesenPool.length&&st.simuTimer){clearInterval(st.simuTimer);st.simuTimer=null;}
  render();
}
function renderLesenResult(){
  checkAchievements({goetheLesenBest: Math.round((st.lesenCorrect/(st.lesenPool?st.lesenPool.length:1))*100)});
  const total=st.lesenPool?st.lesenPool.length:LESEN_AUFGABEN.length;
  const pct=Math.round((st.lesenCorrect/total)*100);
  const lulus=pct>=60;
  const entry={name:st.name||"Anonym",score:st.lesenScore,q:total,acc:pct,mode:"Lesen",date:new Date().toLocaleDateString("id-ID")};
  const lb=[...getLB(),entry].sort((a,b)=>b.score-a.score).slice(0,10); saveLB(lb);
  return`
    <div class="title">Hasil Lesen 📖</div>
    <div class="subtitle">Goethe-Zertifikat A1</div>
    <div class="score-circle" style="background:${lulus?'linear-gradient(135deg,#4ade80,#22c55e)':'linear-gradient(135deg,#f87171,#ef4444)'}">
      <div class="score-num">${pct}%</div>
      <div class="score-label">${lulus?'LULUS':'BELUM'}</div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${st.lesenCorrect}</div><div class="stat-lbl">Benar</div></div>
      <div class="stat-box"><div class="stat-val">${st.lesenWrong}</div><div class="stat-lbl">Salah</div></div>
      <div class="stat-box"><div class="stat-val">${st.lesenScore}</div><div class="stat-lbl">Poin</div></div>
    </div>
    <div style="background:rgba(255,255,255,0.06);border-radius:14px;padding:14px;font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:16px">
      ${lulus?'🎉 Selamat! Nilai kamu di atas 60%. Kamu siap untuk ujian Lesen!':'💪 Nilai minimum lulus adalah 60%. Terus latihan ya!'}
    </div>
    <button class="btn-primary" onclick="startLesen()">Coba Lagi 🔁</button>
    <button class="btn-secondary" onclick="goTo('goethe')">← Kembali ke Prüfung</button>
    <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>
  `;
}

function startSchreiben(){

  st.schreibenScore=0; st.schreibenCount=0;
  st.schreibenFormData={}; st.schreibenAIFeedback=null; st.schreibenLoading=false;
  // Simulasi: exactly 1 formular + 1 freitext (Teil 1 & 2)
  st.schreibenPool = st.goetheMode==='simulasi'
    ? [SCHREIBEN_AUFGABEN.find(a=>a.type==='formular'), SCHREIBEN_AUFGABEN.find(a=>a.type==='freitext')]
    : SCHREIBEN_AUFGABEN;
  st.screen='schreiben'; render();
}
function renderSchreiben(){
  if(st.schreibenIdx >= st.schreibenPool.length) return renderSchreibenResult();
  const aufgabe = st.schreibenPool[st.schreibenIdx];
  const num = st.schreibenIdx+1;
  const stotal = st.schreibenPool.length;
  const pct = Math.round((st.schreibenIdx/stotal)*100);
  const wordCount = (st.schreibenText.trim().match(/\S+/g)||[]).length;

  if(aufgabe.type === 'formular'){
    // Render form fields
    const fieldsHtml = aufgabe.fields.map(f=>`
      <div style="margin-bottom:10px">
        <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:4px;font-weight:600">${f.label}</div>
        <input placeholder="${f.placeholder}" style="margin-bottom:0" id="sf_${f.key}" value="${(st.schreibenFormData&&st.schreibenFormData[f.key])||''}"
          oninput="updateFormField('${f.key}',this.value)"/>
      </div>`).join('');
    const allFilled = aufgabe.fields.every(f=>st.schreibenFormData&&st.schreibenFormData[f.key]&&st.schreibenFormData[f.key].trim());
    const feedbackHtml = st.schreibenSubmitted ? `
      <div class="schreiben-feedback correct show">
        <div class="fb-label" style="color:#4ade80">✓ Formulir terisi!</div>
        <div class="fb-musterloesung">Musterlösung: <strong>${aufgabe.muster}</strong></div>
      </div>` : '';
    const btn = st.schreibenSubmitted
      ? `<button class="btn-primary" onclick="nextSchreiben()">${num < stotal?'Soal Berikutnya →':'Lihat Hasil 🏁'}</button>`
      : `<button id="formularBtn" class="btn-primary" onclick="submitFormular()" ${allFilled?'':'disabled'} style="${allFilled?'':'opacity:0.4'}">✓ Selesai</button>`;
    return`
      <button class="close-btn" onclick="goTo('goethe')">✕</button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#a78bfa,#60a5fa);border-radius:99px"></div>
        </div>
        <span style="font-size:12px;color:rgba(255,255,255,0.5)">${num}/${stotal}</span>
      </div>
      <div style="font-size:11px;color:#a78bfa;font-weight:700;letter-spacing:1px;margin-bottom:8px">✍️ SCHREIBEN · ${aufgabe.title}</div>
      <div class="schreiben-prompt">
        <div class="prompt-type">AUFGABE</div>
        <div class="prompt-text">${aufgabe.prompt}</div>
      </div>
      ${fieldsHtml}
      ${feedbackHtml}
      ${btn}
    `;
  } else {
    // freitext
    const feedbackHtml = st.schreibenSubmitted ? buildSchreibenFeedback(aufgabe) : '';
    const btn = st.schreibenSubmitted
      ? `<button class="btn-primary" onclick="nextSchreiben()">${num < stotal?'Soal Berikutnya →':'Lihat Hasil 🏁'}</button>`
      : `<button class="btn-primary" onclick="submitSchreiben()" ${wordCount>=10?'':'disabled'} style="${wordCount>=10?'':'opacity:0.4'}">✓ Kirim Jawaban</button>`;
    return`
      <button class="close-btn" onclick="goTo('goethe')">✕</button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <div style="flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#a78bfa,#60a5fa);border-radius:99px"></div>
        </div>
        <span style="font-size:12px;color:rgba(255,255,255,0.5)">${num}/${stotal}</span>
      </div>
      <div style="font-size:11px;color:#a78bfa;font-weight:700;letter-spacing:1px;margin-bottom:8px">✍️ SCHREIBEN · ${aufgabe.title}</div>
      <div class="schreiben-prompt">

        <div class="prompt-text">${aufgabe.prompt.split('\n').join('<br>').split('•').join('→')}</div>

      <textarea class="schreiben-area" placeholder="Schreiben Sie hier..." id="schreibenTA"

      <div class="word-count" id="wcDisplay">${wordCount} kata</div>

      ${btn}

function updateFormField(key, val){
  if(!st.schreibenFormData) st.schreibenFormData={};
  st.schreibenFormData[key]=val;
  // Update button state without full re-render
  const aufgabe=SCHREIBEN_AUFGABEN[st.schreibenIdx];
  if(!aufgabe||aufgabe.type!=='formular') return;
  const allFilled=aufgabe.fields.every(f=>st.schreibenFormData&&st.schreibenFormData[f.key]&&st.schreibenFormData[f.key].trim());
  const btn=document.getElementById('formularBtn');
  if(btn){ btn.disabled=!allFilled; btn.style.opacity=allFilled?'1':'0.4'; }
}
function updateWordCount(){
  const wc=(st.schreibenText.trim().match(/\S+/g)||[]).length;
  const el=document.getElementById('wcDisplay');
  if(el) el.textContent=wc+' kata';
  const btn=document.querySelector('.btn-primary');
  if(btn&&!st.schreibenSubmitted) btn.disabled=wc<10, btn.style.opacity=wc>=10?'1':'0.4';
}

      </div>

      </div>
      <div style="background:rgba(255,255,255,0.07);border-radius:10px;padding:8px;text-align:center">

async function submitSchreiben(){
  if(!st.schreibenText.trim()) return;
  const aufgabe=SCHREIBEN_AUFGABEN[st.schreibenIdx];
  const wordCount=(st.schreibenText.trim().match(/\S+/g)||[]).length;

  // Show loading state
  st.schreibenSubmitted=true;
  st.schreibenAIFeedback=null;
  st.schreibenLoading=true;
  render();

  try {
    const systemPrompt = `Du bist ein Goethe-Institut Prüfer für das Goethe-Zertifikat A1. 
Bewerte die folgende Schreiben-Aufgabe streng nach Goethe A1 Kriterien.

Aufgabe: ${aufgabe.prompt}
Musterlösung: ${aufgabe.muster}

Bewertungskriterien:
1. Inhalt (0-5): Alle 3 Pflichtpunkte erfüllt?
2. Kommunikative Gestaltung (0-5): Zusammenhängend und verständlich?
3. Formale Richtigkeit (0-5): Grammatik und Orthographie?

Antworte NUR als JSON ohne Markdown:
{"inhalt":{"punkte":0,"kommentar":"..."},"kommunikation":{"punkte":0,"kommentar":"..."},"grammatik":{"punkte":0,"kommentar":"..."},"gesamt":0,"bestanden":false,"verbesserung":"...","lob":"..."}`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:600,
        system: systemPrompt,
        messages:[{role:'user', content:`Schülerantwort (${wordCount} Wörter):\n\n${st.schreibenText}`}]
      })
    });
    const data = await resp.json();
    const raw = data.content[0].text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(raw);
    st.schreibenAIFeedback = result;
    // Score: gesamt out of 15
    const score = Math.round((result.gesamt/15)*15);
    st.schreibenScore += Math.max(0, Math.min(15, result.gesamt));
  } catch(e) {
    // Fallback to keyword check if API fails
    const text=st.schreibenText.toLowerCase();
    const hit=aufgabe.keywords?aufgabe.keywords.filter(k=>text.includes(k.toLowerCase())).length:3;
    const max=aufgabe.keywords?aufgabe.keywords.length:3;
    const score=Math.round((hit/max)*15);
    st.schreibenScore+=score;
    st.schreibenAIFeedback={error:true, gesamt:score};
  }
  st.schreibenLoading=false;
  st.schreibenCount++;
  render();
}

  if(extra) Object.assign(achd, extra);
  if(extra && extra.totalCorrect) achd.totalCorrect=(achd.totalCorrect||0)+extra.totalCorrect;
  if(extra && extra.fcTotal) achd.fcTotal=(achd.fcTotal||0)+extra.fcTotal;
  saveAchData(achd);

  const newUnlocks = [];
  ACHIEVEMENTS.forEach(a=>{
    if(!achd.unlocked.includes(a.id) && a.check(merged)){

  if(newUnlocks.length){ saveAchData(achd); newUnlocks.forEach(a=>showAchToast(a)); }

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _actx = null;
function getACtx(){ if(!_actx) _actx = new AudioCtx(); return _actx; }

function playSound(type){
  try {
    const ctx = getACtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    if(type==='correct'){
      o.frequency.setValueAtTime(523, ctx.currentTime);
      o.frequency.setValueAtTime(659, ctx.currentTime+0.1);
      o.frequency.setValueAtTime(784, ctx.currentTime+0.2);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
      o.start(); o.stop(ctx.currentTime+0.4);
    } else if(type==='wrong'){
      o.type='sawtooth';
      o.frequency.setValueAtTime(220, ctx.currentTime);
      o.frequency.setValueAtTime(180, ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.1, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.3);
      o.start(); o.stop(ctx.currentTime+0.3);
    } else if(type==='levelup'){
      [523,659,784,1047].forEach((f,i)=>{
        const oo=ctx.createOscillator(), gg=ctx.createGain();
        oo.connect(gg); gg.connect(ctx.destination);
        oo.frequency.value=f;
        gg.gain.setValueAtTime(0.15,ctx.currentTime+i*0.12);
        gg.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.12+0.2);
        oo.start(ctx.currentTime+i*0.12); oo.stop(ctx.currentTime+i*0.12+0.2);
      });
    } else if(type==='flip'){
      o.frequency.setValueAtTime(440, ctx.currentTime);
      g.gain.setValueAtTime(0.05, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.1);
      o.start(); o.stop(ctx.currentTime+0.1);
    } else if(type==='complete'){
      [392,523,659,784,1047].forEach((f,i)=>{
        const oo=ctx.createOscillator(), gg=ctx.createGain();
        oo.connect(gg); gg.connect(ctx.destination);
        oo.frequency.value=f; oo.type='sine';
        gg.gain.setValueAtTime(0.12,ctx.currentTime+i*0.1);
        gg.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.25);
        oo.start(ctx.currentTime+i*0.1); oo.stop(ctx.currentTime+i*0.1+0.25);
      });
    }
  } catch(e){}
}

function getXPData(){
  try{ return JSON.parse(localStorage.getItem('de_xp')||'{"xp":0,"streak":0,"lastDate":"","totalSessions":0,"catStats":{}}'); }
  catch{ return {xp:0,streak:0,lastDate:"",totalSessions:0,catStats:{}}; }
}
function saveXPData(d){ try{ localStorage.setItem('de_xp',JSON.stringify(d)); }catch{} }
function getCurrentLevel(xp){
  for(let i=LEVELS.length-1;i>=0;i--){ if(xp>=LEVELS[i].min) return LEVELS[i]; }
  return LEVELS[0];
}
function addXP(amount, cat){
  const d=getXPData();
  d.xp=(d.xp||0)+amount;
  d.totalSessions=(d.totalSessions||0)+1;
  if(cat){
    if(!d.catStats) d.catStats={};
    if(!d.catStats[cat]) d.catStats[cat]={correct:0,total:0};
    d.catStats[cat].total++;
    d.catStats[cat].correct++;
  }
  // Daily streak
  const today=new Date().toDateString();
  if(d.lastDate===today){ /* same day, no change */ }
  else if(d.lastDate===new Date(Date.now()-86400000).toDateString()){ d.streak=(d.streak||0)+1; }
  else{ d.streak=1; }
  d.lastDate=today;
  saveXPData(d);
  return d;
}
function addWrongStat(cat){
  const d=getXPData();
  if(cat){
    if(!d.catStats) d.catStats={};
    if(!d.catStats[cat]) d.catStats[cat]={correct:0,total:0};
    d.catStats[cat].total++;
  }
  saveXPData(d);
}

// ======== FLASHCARD ========
function startFlashcard(){
  st.fcPool=shuffle([...UNIQUE_VOCAB]);
  st.fcIdx=0; st.fcFlipped=false; st.fcKnow=0; st.fcDunno=0;
  st.screen='flashcard'; render();
}
function renderFlashcard(){
  if(st.fcIdx>=st.fcPool.length){
    return`
      <div class="title">Flashcard Selesai! 🎉</div>
      <div class="subtitle">Kamu sudah review semua kartu</div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-val">${st.fcPool.length}</div><div class="stat-lbl">Total</div></div>
        <div class="stat-box"><div class="stat-val" style="-webkit-text-fill-color:#4ade80">${st.fcKnow}</div><div class="stat-lbl">Tahu ✓</div></div>
        <div class="stat-box"><div class="stat-val" style="-webkit-text-fill-color:#f87171">${st.fcDunno}</div><div class="stat-lbl">Belum ✗</div></div>
      </div>
      <button class="btn-primary" onclick="startFlashcard()">Ulangi 🔁</button>
      <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>`;
  }
  const v=st.fcPool[st.fcIdx];
  const prog=st.fcIdx+1;
  const pct=Math.round((st.fcIdx/st.fcPool.length)*100);
  const flipped=st.fcFlipped;
  return`
    <button class="close-btn" onclick="goTo('home')">✕</button>
    <div class="meta" style="padding-right:36px;margin-bottom:10px">
      <span style="font-size:12px;color:rgba(255,255,255,0.5)">${prog}/${st.fcPool.length}</span>
      <span style="color:#4ade80;font-size:12px">✓ ${st.fcKnow}</span>
      <span style="color:#f87171;font-size:12px">✗ ${st.fcDunno}</span>
    </div>
    <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${pct}%"></div></div>
    <div style="font-size:11px;color:rgba(255,255,255,0.3);text-align:center;margin-bottom:12px">${flipped?'Tap kartu untuk balik':'Tap kartu untuk lihat jawaban'}</div>
    <div class="flashcard-wrap ${flipped?'flipped':''}" onclick="st.fcFlipped=!st.fcFlipped;playSound('flip');render()">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="fc-emoji">${v.e}</div>
          <div class="fc-word">${v.w}</div>
          <div class="fc-hint">${v.c}</div>
        </div>
        <div class="flashcard-back">
          <div class="fc-artikel">${v.a!=='-'?v.a:''}</div>
          <div class="fc-answer">${v.m}</div>
          <div class="fc-hint">${v.c} · ${v.w}</div>
        </div>
      </div>
    </div>
    ${flipped?`<div class="fc-actions">
      <button class="fc-btn-dunno" onclick="fcAnswer(false)">✗ Belum tahu</button>
      <button class="fc-btn-know" onclick="fcAnswer(true)">✓ Sudah tahu</button>
    </div>`:`<div style="text-align:center;color:rgba(255,255,255,0.3);font-size:12px;padding:14px 0">👆 Tap kartu untuk reveal</div>`}
    <div style="display:flex;gap:8px">
      <button class="btn-secondary" style="flex:1" onclick="fcSkip()">Skip →</button>
    </div>
  `;
}
function fcAnswer(know){
  const v=st.fcPool[st.fcIdx];
  if(know){ st.fcKnow++; playSound("correct"); showXPToast(3); addXP(3,v.c); checkAchievements({fcTotal:1}); }
  else{ st.fcDunno++; playSound("wrong"); addWrongStat(v.c); }
  st.fcIdx++; st.fcFlipped=false; render();
}
function fcSkip(){ st.fcIdx++; st.fcFlipped=false; render(); }

// ======== PROGRESS TRACKER ========
function renderProgress(){
  const d=getXPData();
  const lvl=getCurrentLevel(d.xp||0);
  const nextLvl=LEVELS.find(l=>l.min>d.xp)||LEVELS[LEVELS.length-1];
  const xpInLevel=(d.xp||0)-lvl.min;
  const xpNeeded=nextLvl.min-lvl.min;
  const xpPct=Math.min(100,Math.round((xpInLevel/xpNeeded)*100));
  const cats=Object.keys(d.catStats||{});
  const catRows=cats.length===0
    ?'<div style="color:rgba(255,255,255,0.3);text-align:center;padding:16px">Belum ada data. Mulai quiz dulu!</div>'
    :cats.sort((a,b)=>{
      const sa=(d.catStats[a].correct/d.catStats[a].total)||0;
      const sb=(d.catStats[b].correct/d.catStats[b].total)||0;
      return sa-sb;
    }).map(cat=>{
      const s=d.catStats[cat];
      const pct=Math.round((s.correct/s.total)*100);
      const col=pct>=80?'#4ade80':pct>=60?'#facc15':'#f87171';
      return`<div class="progress-row">
        <div class="cat-name">${cat}</div>
        <div class="p-bar"><div class="p-fill" style="width:${pct}%;background:${col}"></div></div>
        <div class="p-pct" style="color:${col}">${pct}%</div>
      </div>`;
    }).join('');
  const weakCats=cats.filter(c=>{
    const s=d.catStats[c]; return s&&(s.correct/s.total)<0.6;
  });
  return`
    <button class="close-btn" onclick="goTo('home')">✕</button>
    <div class="title" style="font-size:22px">Progress 📊</div>
    <div style="background:rgba(255,255,255,0.06);border-radius:16px;padding:16px;margin-bottom:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:3px">LEVEL ${lvl.lvl}</div>
          <div style="font-size:18px;font-weight:800">${lvl.icon} ${lvl.name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:22px;font-weight:800;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${d.xp||0}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">Total XP</div>
        </div>
      </div>
      <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${xpPct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,0.3);margin-top:3px">
        <span>${xpInLevel} XP</span><span>${xpNeeded} XP untuk level ${lvl.lvl+1}</span>
      </div>
    </div>
    <div class="home-stats" style="margin-bottom:14px">
      <div class="home-stat"><div class="streak-fire">🔥</div><div class="home-stat-val">${d.streak||0}</div><div class="home-stat-lbl">Hari Streak</div></div>
      <div class="home-stat"><div style="font-size:22px">🎮</div><div class="home-stat-val">${d.totalSessions||0}</div><div class="home-stat-lbl">Sesi</div></div>
      <div class="home-stat"><div style="font-size:22px">📚</div><div class="home-stat-val">${cats.length}</div><div class="home-stat-lbl">Kategori</div></div>
    </div>
    ${weakCats.length>0?`<div style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:14px;padding:12px;margin-bottom:14px;font-size:12px">
      <div style="color:#f87171;font-weight:700;margin-bottom:4px">⚠️ Kategori yang perlu latihan:</div>
      ${weakCats.map(c=>`<span style="background:rgba(248,113,113,0.15);border-radius:99px;padding:3px 10px;margin:2px;display:inline-block;color:#f87171">${c}</span>`).join('')}
    </div>`:''}
    <div style="font-size:11px;color:rgba(255,255,255,0.4);font-weight:700;margin-bottom:10px">AKURASI PER KATEGORI</div>
    ${catRows}
    <button class="btn-secondary" style="margin-top:10px" onclick="goTo('home')">← Kembali</button>
  `;
}

const KASUS_COLORS = {NOM:'#60a5fa', AKK:'#a78bfa', DAT:'#4ade80'};
const KASUS_LABELS = {NOM:'NOMINATIV', AKK:'AKKUSATIV', DAT:'DATIV'};
const KASUS_DESC = {
  NOM:'Subjek kalimat — siapa yang melakukan',
  AKK:'Objek langsung — siapa/apa yang dikenai',
  DAT:'Objek tidak langsung / setelah preposisi tertentu',
};

function buildVKCatCards(){
  let html = '';
  VK_CATS.forEach(function(kat){
    const col = VK_CAT_COLORS[kat];
    const icon = VK_CAT_ICONS[kat];
    const desc = VK_CAT_DESC[kat];
    const cnt = kat === 'Semua' ? VERBEN_KONJUGASI.length : VERBEN_KONJUGASI.filter(function(s){return s.kat===kat;}).length;
    const hexAlpha = col.replace('#','');
    html += '<div onclick="startVerbenVocab(\''+kat+'\')" style="display:flex;align-items:center;gap:14px;padding:13px;border-radius:16px;border:2px solid '+col+'40;background:'+col+'0d;cursor:pointer;margin-bottom:8px">';
    html += '<div style="font-size:24px">'+icon+'</div>';
    html += '<div style="flex:1"><div style="font-weight:800;font-size:13px;color:'+col+'">'+kat+'</div>';
    html += '<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px">'+desc+'</div></div>';
    html += '<div style="text-align:right"><div style="font-size:12px;color:'+col+';font-weight:700">'+cnt+' soal</div>';
    html += '<div style="font-size:18px;color:rgba(255,255,255,0.2)">&#x203A;</div></div></div>';
  });
  return html;
}

  let cards = '';
  rows.forEach(function(k){
    const cnt = VERBEN_SOAL.filter(function(s){return s.kasus===k.k;}).length;
    cards += '<div onclick="startVerben(\''+k.k+'\')" style="display:flex;align-items:center;gap:14px;padding:14px;border-radius:16px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);cursor:pointer;margin-bottom:10px">';
