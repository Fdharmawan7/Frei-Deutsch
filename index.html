function startVerben(filterKasus){
  st.verbenFilter = filterKasus || 'ALL';
  st.verbenPool = shuffle(filterKasus && filterKasus!=='ALL'
    ? VERBEN_SOAL.filter(s=>s.kasus===filterKasus)
    : VERBEN_SOAL);
  st.verbenIdx=0; st.verbenSel=null; st.verbenAnswered=false;
  st.verbenCorrect=0; st.verbenWrong=0; st.verbenScore=0;
  st.screen='verben'; render();
}

function handleVerben(idx){
  if(st.verbenAnswered) return;
  st.verbenSel=idx; st.verbenAnswered=true;
  const soal=st.verbenPool[st.verbenIdx];
  if(idx===soal.answer){
    st.verbenCorrect++; st.verbenScore+=10;
    playSound('correct'); showXPToast(5); addXP(5,'Verben');
    checkAchievements({totalCorrect:1});
  } else {
    st.verbenWrong++; playSound('wrong'); shakeCard();
    addWrongStat('Verben');
  }
  render();
}

function nextVerben(){
  st.verbenIdx++; st.verbenSel=null; st.verbenAnswered=false; render();
}

function renderVerben(){
  if(st.verbenIdx >= st.verbenPool.length) return renderVerbenResult();
  const soal = st.verbenPool[st.verbenIdx];
  const num = st.verbenIdx+1;
  const total = st.verbenPool.length;
  const pct = Math.round((st.verbenIdx/total)*100);
  const col = KASUS_COLORS[soal.kasus];
  const kasusLabel = KASUS_LABELS[soal.kasus];

  // Build question display
  let qDisplay = soal.q;
  if(st.verbenAnswered){
    const correct = soal.options[soal.answer];
    qDisplay = soal.q.replace('___', '<span class="kasus-blank" style="color:'+col+';border-color:'+col+'">'+correct+'</span>');
  } else {
    qDisplay = soal.q.replace('___', '<span class="kasus-blank">___</span>');
  }

  const opts = soal.options.map((o,i)=>{
    let bg='rgba(255,255,255,0.06)'; let border='rgba(255,255,255,0.1)'; let color='#fff';
    if(st.verbenAnswered){
      if(i===soal.answer){ bg='rgba(74,222,128,0.15)'; border='#4ade80'; color='#4ade80'; }
      else if(i===st.verbenSel){ bg='rgba(248,113,113,0.15)'; border='#f87171'; color='#f87171'; }
      else { bg='rgba(255,255,255,0.03)'; color='rgba(255,255,255,0.3)'; }
    }
    const dis = st.verbenAnswered ? 'disabled' : '';
    return '<button onclick="handleVerben('+i+')" '+dis+' style="padding:13px;border-radius:14px;border:2px solid '+border+';background:'+bg+';color:'+color+';font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center">'+o+'</button>';
  }).join('');

  const verbTag = soal.verb ? '<span style="background:rgba(250,204,21,0.15);color:#facc15;border-radius:99px;padding:2px 10px;font-size:11px;font-weight:700;margin-left:8px">Verb: '+soal.verb+'</span>' : '';

  let html = '<button class="close-btn" onclick="goTo(\'home\')">&#x2715;</button>';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:44px">';
  html += '<div style="flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden">';
  html += '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,'+col+',#a78bfa);border-radius:99px;transition:width 0.3s"></div></div>';
  html += '<span style="font-size:12px;color:rgba(255,255,255,0.5)">'+num+'/'+total+'</span></div>';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">';
  html += '<span class="kasus-badge kasus-'+soal.kasus+'">'+kasusLabel+'</span>'+verbTag+'</div>';
  html += '<div class="kasus-question">'+qDisplay+'</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">'+opts+'</div>';
  if(st.verbenAnswered){
    const blankHint = soal.blank ? '<br><span style="color:rgba(255,255,255,0.4)">→ '+soal.blank+'</span>' : '';
    const nextLabel = st.verbenIdx+1 < total ? 'Soal Berikutnya →' : 'Lihat Hasil 🏁';
    html += '<div class="kasus-tip">💡 '+soal.tip+blankHint+'</div>';
    html += '<button class="btn-primary" onclick="nextVerben()">'+nextLabel+'</button>';
  } else {
    html += '<div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.35);padding:0 4px">';
    html += '<span style="color:#4ade80">✓ '+st.verbenCorrect+' benar</span>';
    html += '<span style="color:#f87171">✗ '+st.verbenWrong+' salah</span></div>';
  }
  return html;
}

function renderVerbenResult(){
  const total=st.verbenPool.length;
  const pct=Math.round((st.verbenCorrect/total)*100);
  const lulus=pct>=60;
  const entry={name:st.name||"Anonym",score:st.verbenScore,q:total,acc:pct,mode:"Verben",date:new Date().toLocaleDateString("id-ID")};
  const lb=[...getLB(),entry].sort((a,b)=>b.score-a.score).slice(0,10); saveLB(lb);
  checkAchievements({totalCorrect:st.verbenCorrect});
  return`
    <div class="title">Hasil Verben 📝</div>
    <div class="subtitle">${KASUS_LABELS[st.verbenFilter]||'Semua Kasus'}</div>
    <div class="score-circle" style="background:${lulus?'linear-gradient(135deg,#4ade80,#22c55e)':'linear-gradient(135deg,#f87171,#ef4444)'}">
      <div class="score-num">${pct}%</div>
      <div class="score-label">${lulus?'Bagus!':'Coba lagi'}</div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${st.verbenCorrect}</div><div class="stat-lbl">Benar</div></div>
      <div class="stat-box"><div class="stat-val">${st.verbenWrong}</div><div class="stat-lbl">Salah</div></div>
      <div class="stat-box"><div class="stat-val">${st.verbenScore}</div><div class="stat-lbl">Poin</div></div>
    </div>
    <div style="background:rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:16px;font-size:13px">
      <div style="font-weight:700;margin-bottom:10px;color:rgba(255,255,255,0.7)">📋 Ringkasan Kasus</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;text-align:center">
        <div style="background:rgba(96,165,250,0.1);border-radius:10px;padding:8px">
          <div style="color:#60a5fa;font-weight:800;font-size:11px">NOMINATIV</div>
          <div style="margin-top:4px;color:rgba(255,255,255,0.6)">der/die/das</div>
        </div>
        <div style="background:rgba(167,139,250,0.1);border-radius:10px;padding:8px">
          <div style="color:#a78bfa;font-weight:800;font-size:11px">AKKUSATIV</div>
          <div style="margin-top:4px;color:rgba(255,255,255,0.6)">den/die/das</div>
        </div>
        <div style="background:rgba(74,222,128,0.1);border-radius:10px;padding:8px">
          <div style="color:#4ade80;font-weight:800;font-size:11px">DATIV</div>
          <div style="margin-top:4px;color:rgba(255,255,255,0.6)">dem/der/dem</div>
        </div>
      </div>
    </div>
    <button class="btn-primary" onclick="startVerben(st.verbenFilter)">Coba Lagi 🔁</button>
    <button class="btn-secondary" onclick="goTo('home')">🏠 Home</button>
  `;
}

// ======== LEADERBOARD ========
function saveSessionLB(mode){
  const score=mode==="Quiz"?st.score:mode==="Anagram"?st.anScore:st.sentScore;
  const q=mode==="Quiz"?st.qNum:mode==="Anagram"?st.anNum:st.sentNum;
  const correct=mode==="Quiz"?st.correct:mode==="Anagram"?st.anCorrect:st.sentCorrect;
  const acc=q>0?Math.round((correct/q)*100):0;
  const entry={name:st.name||"Anonym",score,q,acc,mode,date:new Date().toLocaleDateString("id-ID")};
  const lb=[...getLB(),entry].sort((a,b)=>b.score-a.score).slice(0,10);
  saveLB(lb);
}
function renderLeaderboard(){
  const lb=getLB();
  const medals=["🥇","🥈","🥉"];
  const rows=lb.length===0
    ?`<div style="text-align:center;color:rgba(255,255,255,0.4);padding:28px 0">Belum ada data</div>`
    :lb.map((e,i)=>`
      <div class="lb-row ${i===0?'top':''}">
        <div class="lb-rank">${medals[i]||"#"+(i+1)}</div>
        <div class="lb-name"><strong>${e.name}</strong><small>${e.mode} · ${e.q} soal · ${e.acc}% · ${e.date}</small></div>
        <div class="lb-score">${e.score}</div>
      </div>`).join("");
  return`
    <div class="title">🏆 Leaderboard</div>
    <div class="subtitle">Top 10 Sesi Terbaik</div>
    ${rows}
    <button class="btn-secondary" onclick="goTo('home')">← Kembali</button>
  `;
}

const VK_CATS = ['Semua','Hilfsverben','Modalverben','Vollverben','Jenis Verben'];
const VK_CAT_COLORS = {
  'Semua':'#facc15','Hilfsverben':'#60a5fa','Modalverben':'#a78bfa','Vollverben':'#4ade80','Jenis Verben':'#fb923c'
};
const VK_CAT_ICONS = {
  'Semua':'🎯','Hilfsverben':'🔧','Modalverben':'💬','Vollverben':'⚡','Jenis Verben':'📚'
};
const VK_CAT_DESC = {
  'Semua':'Semua jenis verb',
  'Hilfsverben':'sein, haben, werden',
  'Modalverben':'können, müssen, wollen, dürfen, sollen, mögen',
  'Vollverben':'Kata kerja penuh – regelm. & unregelm.',
  'Jenis Verben':'Kenali jenis & pola verb'
};

function startVerbenVocab(filterKat){
  st.vvFilter = filterKat || 'Semua';
  const pool = filterKat && filterKat !== 'Semua'
    ? VERBEN_KONJUGASI.filter(s => s.kat === filterKat)
    : VERBEN_KONJUGASI;
  st.vvPool = shuffle([...pool]);
  st.vvIdx = 0; st.vvSel = null; st.vvAnswered = false;
  st.vvCorrect = 0; st.vvWrong = 0; st.vvScore = 0;
  st.vvOpts = []; st.vvAns = -1;
  generateVVOptions();
  st.screen = 'verben_vocab'; render();
}

function generateVVOptions(){
  const q = st.vvPool[st.vvIdx];
  if(!q) return;
  // Options already defined in data — no shuffle needed
  st.vvOpts = [...q.options];
  st.vvAns = q.answer;
}

function handleVV(idx){
  if(st.vvAnswered) return;
  st.vvSel = idx;
  st.vvAnswered = true;
  if(idx === st.vvAns){
    st.vvCorrect++;
    st.vvScore += 10;
    addXP(5); playSound('correct');
  } else {
    st.vvWrong++;
    playSound('wrong');
  }
  render();
}

function nextVV(){
  st.vvIdx++;
  st.vvSel = null; st.vvAnswered = false;
  if(st.vvIdx >= st.vvPool.length){
    st.screen = 'verben_vocab_result'; render(); return;
  }
  generateVVOptions();
  render();
}

function renderVerbenVocab(){
  if(st.vvIdx >= st.vvPool.length){ st.screen='verben_vocab_result'; return renderVerbenVocabResult(); }
  const q = st.vvPool[st.vvIdx];
  const num = st.vvIdx + 1;
  const total = st.vvPool.length;
  const pct = Math.round((st.vvIdx / total) * 100);
  const ansIdx = st.vvAns;
  const allOpts = st.vvOpts;
  const col = VK_CAT_COLORS[q.kat] || '#a78bfa';
  const jenisColor = q.jenis === 'regelmaßig' ? '#4ade80' : '#f87171';
  const jenisLabel = q.jenis === 'regelmaßig' ? 'Regelmäßig' : 'Unregelmäßig';

  const opts = allOpts.map((o, i) => {
    let bg = 'rgba(255,255,255,0.06)', border = 'rgba(255,255,255,0.1)', color = '#fff';
    if(st.vvAnswered){
      if(i === ansIdx){ bg = 'rgba(74,222,128,0.15)'; border = '#4ade80'; color = '#4ade80'; }
      else if(i === st.vvSel){ bg = 'rgba(248,113,113,0.15)'; border = '#f87171'; color = '#f87171'; }
      else { bg = 'rgba(255,255,255,0.03)'; color = 'rgba(255,255,255,0.3)'; }
    }
    const dis = st.vvAnswered ? 'disabled' : '';
    return `<button onclick="handleVV(${i})" ${dis} style="padding:13px 10px;border-radius:14px;border:2px solid ${border};background:${bg};color:${color};font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;text-align:center;width:100%">${o}</button>`;
  }).join('');

  const nextLabel = num < total ? 'Soal Berikutnya →' : 'Lihat Hasil 🏁';
  const optCols = allOpts.length <= 4 ? '1fr 1fr' : '1fr';

  let html = `<button class="close-btn" onclick="goTo('verben_menu')">&#x2715;</button>`;
  html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:44px">`;
  html += `<div style="flex:1;height:5px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden">`;
  html += `<div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${col},#a78bfa);border-radius:99px;transition:width 0.3s"></div></div>`;
  html += `<span style="font-size:12px;color:rgba(255,255,255,0.5)">${num}/${total}</span></div>`;

  html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap">`;
  html += `<span style="background:rgba(255,255,255,0.08);color:${col};border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700">${VK_CAT_ICONS[q.kat]} ${q.kat}</span>`;
  html += `<span style="background:rgba(255,255,255,0.05);color:${jenisColor};border-radius:99px;padding:3px 10px;font-size:10px;font-weight:700;border:1px solid ${jenisColor}40">${jenisLabel}</span>`;
  html += `<span style="color:rgba(255,255,255,0.3);font-size:10px">${q.sub}</span></div>`;

  html += `<div style="background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);border-left:4px solid ${col};border-radius:16px;padding:20px;margin-bottom:14px">`;
  html += `<div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:8px">Lengkapi kalimat berikut:</div>`;
  html += `<div style="font-size:18px;font-weight:700;line-height:1.7;color:#fff">${q.q.replace('___','<span style="display:inline-block;min-width:60px;border-bottom:2px solid '+col+';color:'+col+';font-weight:900;text-align:center;padding:0 4px">___</span>')}</div>`;
  html += `</div>`;

  html += `<div style="display:grid;grid-template-columns:${optCols};gap:10px;margin-bottom:12px">${opts}</div>`;

  if(st.vvAnswered){
    const correct = allOpts[ansIdx];
    const isCorrect = st.vvSel === ansIdx;
    html += `<div style="background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25);border-radius:12px;padding:12px 14px;margin-bottom:10px">`;
    html += `<div style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:4px">${isCorrect ? '✅' : '❌'} Jawaban: <strong style="color:#4ade80">${correct}</strong></div>`;
    html += `<div style="font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5">💡 ${q.tip}</div>`;
    html += `</div>`;
    html += `<button class="btn-primary" onclick="nextVV()">${nextLabel}</button>`;
  } else {
    html += `<div style="display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,0.35);padding:0 4px">`;
    html += `<span style="color:#4ade80">✓ ${st.vvCorrect} benar</span>`;
    html += `<span style="color:#f87171">✗ ${st.vvWrong} salah</span></div>`;
  }
  return html;
}

function renderVerbenVocabResult(){
  const total = st.vvPool.length;
  const pct = Math.round((st.vvCorrect / total) * 100);
  const lulus = pct >= 60;
  const entry = {name:st.name||"Anonym", score:st.vvScore, q:total, acc:pct, mode:"Konjugasi Verben", date:new Date().toLocaleDateString("id-ID")};
  saveLB(entry);
  const col = VK_CAT_COLORS[st.vvFilter] || '#a78bfa';
  return `
    <div style="text-align:center;padding:16px 0">
      <div style="font-size:52px;margin-bottom:10px">${lulus ? '🎉' : '💪'}</div>
      <div style="font-size:20px;font-weight:900">${VK_CAT_ICONS[st.vvFilter]||'📝'} Konjugasi Verben</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px">${st.vvFilter}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0">
        <div style="background:rgba(255,255,255,0.06);border-radius:14px;padding:12px">
          <div style="font-size:22px;font-weight:900;color:#4ade80">${st.vvCorrect}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">Benar</div>
        </div>
        <div style="background:rgba(255,255,255,0.06);border-radius:14px;padding:12px">
          <div style="font-size:22px;font-weight:900;color:#f87171">${st.vvWrong}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">Salah</div>
        </div>
        <div style="background:rgba(255,255,255,0.06);border-radius:14px;padding:12px">
          <div style="font-size:22px;font-weight:900;color:${col}">${pct}%</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">Akurasi</div>
        </div>
      </div>
      <div style="font-size:26px;font-weight:900;color:${lulus?'#4ade80':'#fb923c'};margin-bottom:6px">${st.vvScore} poin</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:18px">${lulus ? 'Konjugasi dikuasai dengan baik! 🌟' : 'Terus latihan, kamu pasti bisa! 💪'}</div>
      <div style="background:rgba(255,255,255,0.05);border-radius:14px;padding:12px;margin-bottom:16px;font-size:12px;color:rgba(255,255,255,0.5);text-align:left">
        <div style="font-weight:700;color:rgba(255,255,255,0.7);margin-bottom:8px">📌 Ringkasan Cepat</div>
        <div>🔧 <strong style="color:#60a5fa">Hilfsverben:</strong> sein · haben · werden</div>
        <div style="margin-top:4px">💬 <strong style="color:#a78bfa">Modalverben:</strong> können · müssen · wollen · dürfen · sollen · mögen</div>
        <div style="margin-top:4px">⚡ <strong style="color:#4ade80">Vollverben Regelm.:</strong> ge- + Stamm + -t (gespielt)</div>
        <div style="margin-top:4px">⚡ <strong style="color:#f87171">Vollverben Unregelm.:</strong> Vokal berubah (getrunken, gegangen)</div>
      </div>
      <button class="btn-primary" onclick="startVerbenVocab('${st.vvFilter}')">Coba Lagi 🔁</button>
      <button class="btn-secondary" onclick="goTo('verben_menu')" style="margin-top:8px">← Kembali</button>
    </div>
  `;
}

</script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(() => console.log('SW registered'))
          .catch(e => console.log('SW error:', e));
      });
    }
  </script>
